<html lang="en">
<head>

  <meta charset="utf-8">

  <title>NEET-PG Medicine PYT Bank | StudyDoc</title>
  <style>
    :root { --ink:#17202a; --muted:#657080; --line:#d8dee8; --bg:#f7f9fb; --panel:#ffffff; --accent:#116466; --accent2:#7C3AED; --ok:#147a45; --bad:#b42318; --warn:#9a6700; --soft:#eef8f8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:'Instrument Sans',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:var(--ink); background:var(--bg); }
    .topnav{background:#fff;border-bottom:1px solid #e5e3dc;padding:0 1.25rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .nav-brand{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
    .brand-logo-picture{display:block;line-height:0}
    .brand-logo-img{display:block;width:190px;height:auto;max-height:54px}
    .nav-right{display:flex;align-items:center;gap:1rem}
    .nav-back{display:flex;align-items:center;gap:4px;color:#667085;text-decoration:none;font-size:13px;font-weight:700;transition:color .15s}
    .nav-back:hover{color:#534AB7}
    .bank-head{max-width:1500px;margin:0 auto;padding:20px 18px 0}
    .bank-title{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px 20px;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}
    .eyebrow{display:inline-flex;width:max-content;background:var(--soft);color:var(--accent);border-radius:999px;padding:5px 10px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
    h1{font-size:28px;line-height:1.15;margin:0 0 5px;color:#102033;letter-spacing:-.45px}
    .sub{margin:0;color:var(--muted);font-size:14px;line-height:1.5;max-width:760px}
    .head-stats{display:grid;grid-template-columns:repeat(2,minmax(90px,1fr));gap:8px;min-width:210px}
    .head-stat{border:1px solid #dce8e8;background:#f8fcfc;border-radius:7px;padding:10px 12px}
    .head-stat b{display:block;color:var(--accent);font-size:21px;line-height:1}
    .head-stat span{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.35px}
    main { display:grid; grid-template-columns:minmax(270px, 370px) 1fr; gap:18px; padding:18px; max-width:1500px; margin:0 auto; }
    aside, section.quiz { background:var(--panel); border:1px solid var(--line); border-radius:8px; min-width:0; }
    aside { height:calc(100vh - 190px); position:sticky; top:82px; display:flex; flex-direction:column; }
    .tools { padding:12px; border-bottom:1px solid var(--line); display:grid; gap:8px; }
    input, select { width:100%; border:1px solid var(--line); border-radius:6px; padding:10px; font:inherit; background:#fff; }
    .stats { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; font-size:13px; color:var(--muted); }
    .stats b { display:block; color:var(--ink); font-size:18px; }
    .reset-bank-btn { width:100%; border:1px solid #f3b8b0; background:#fff7f6; color:#a61b12; border-radius:6px; padding:9px 12px; font:inherit; font-size:13px; font-weight:850; cursor:pointer; }
    .reset-bank-btn:hover:not(:disabled) { border-color:#d92d20; background:#fff1f0; color:#7a1711; }
    .reset-bank-btn:disabled { cursor:not-allowed; border-color:var(--line); background:#f8fafc; color:#98a2b3; }
    .img-filter-btn { width:100%; border:1.5px solid var(--line); background:#fff; border-radius:6px; padding:9px 12px; font:inherit; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:7px; color:var(--muted); transition:border-color .15s, background .15s, color .15s; }
    .img-filter-btn .btn-dot { width:8px; height:8px; border-radius:50%; background:var(--line); flex-shrink:0; transition:background .15s; }
    .img-filter-btn .btn-label { flex:1; text-align:left; }
    .img-filter-btn .btn-state { font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.4px; color:#a9b1bd; transition:color .15s; }
    .img-filter-btn.active { border-color:var(--accent2); background:#F3EFFE; color:#5B21B6; }
    .img-filter-btn.active .btn-dot { background:var(--accent2); }
    .img-filter-btn.active .btn-state { color:var(--accent2); }
    .qlist { overflow:auto; padding:8px; display:grid; gap:6px; }
    .qrow { border:1px solid var(--line); background:white; border-radius:6px; padding:9px; text-align:left; cursor:pointer; font:inherit; }
    .qrow.active { border-color:var(--accent); box-shadow:0 0 0 2px rgba(17,100,102,.16); }
    .qrow.done { background:#fbfdfd; }
    .qrow b { color:#0f172a; }
    .qrow-meta { display:flex; gap:6px; flex-wrap:wrap; margin-top:5px; font-size:11px; font-weight:800; }
    .qrow-topic { color:#5B21B6; }
    .qrow-id { color:#7a8494; }
    .qrow-img { color:var(--accent); }
    .quiz { min-height:calc(100vh - 190px); padding:clamp(16px, 4vw, 34px); }
    .qtop { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .pill { display:inline-flex; align-items:center; border:1px solid var(--line); background:#fff; border-radius:999px; padding:5px 10px; font-size:12px; font-weight:850; color:var(--muted); }
    .pill.topic { color:#5B21B6; border-color:#ddd4ff; background:#f7f3ff; }
    .remaining-meter { display:inline-flex; align-items:center; gap:8px; min-width:150px; color:#7a8494; font-size:12px; font-weight:850; }
    .remaining-track { width:90px; height:6px; border-radius:999px; background:#e7edf4; overflow:hidden; }
    .remaining-fill { display:block; height:100%; border-radius:inherit; background:linear-gradient(90deg, var(--accent), #5B21B6); }
    .remaining-count { white-space:nowrap; }
    .question { font-size:22px; line-height:1.45; margin:0 0 20px; max-width:980px; }
    .image-note { max-width:980px; border:1px solid #cbdff2; background:#f3f8fd; color:#27445f; border-radius:8px; padding:12px 14px; margin:0 0 16px; line-height:1.45; font-size:14px; }
    .qimages { display:flex; flex-wrap:wrap; align-items:flex-start; gap:12px; margin:16px 0; max-width:980px; }
    .qimages figure { margin:0; border:1px solid var(--line); border-radius:8px; overflow:hidden; background:#fff; display:inline-block; max-width:100%; line-height:0; }
    .qimages img { display:block; width:auto; max-width:min(100%, 520px); height:auto; object-fit:contain; }
    .options { display:grid; gap:10px; max-width:960px; }
    .option { border:1px solid var(--line); background:white; border-radius:8px; padding:14px 16px; cursor:pointer; text-align:left; font-size:17px; line-height:1.35; }
    .option.correct { border-color:var(--ok); background:#eefaf3; color:#075532; }
    .option.wrong { border-color:var(--bad); background:#fff1f0; color:#7a1711; }
    .feedback { margin-top:16px; padding:13px 15px; border-radius:8px; border:1px solid var(--line); max-width:960px; line-height:1.5; }
    .feedback.ok { border-color:#a9e5c2; background:#edfdf3; color:#075532; }
    .feedback.bad { border-color:#ffb4ab; background:#fff1f0; color:#7a1711; }
    .explanation { max-width:960px; border:1px solid var(--line); background:#fff; border-radius:8px; margin-top:14px; padding:15px; line-height:1.55; }
    .explanation h3 { margin:0 0 7px; font-size:16px; }
    .option-notes { margin-top:12px; display:grid; gap:7px; }
    .option-note { border:1px solid #edf2f7; background:#f8fafc; border-radius:7px; padding:10px; font-size:14px; }
    .nav { display:flex; gap:8px; margin-top:22px; flex-wrap:wrap; }
    .nav button { border:1px solid var(--line); background:#fff; border-radius:6px; padding:10px 14px; cursor:pointer; font-weight:800; }
    .report-btn { border:1px solid var(--line); background:#f8fafc; color:var(--muted); border-radius:6px; padding:10px 14px; cursor:pointer; font-weight:800; }
    .report-btn:hover { border-color:var(--accent); color:var(--accent); }
    .empty-state { color:var(--muted); margin-top:18px; max-width:960px; line-height:1.5; }
    .report-modal[hidden] { display:none; }
    .report-modal { position:fixed; inset:0; z-index:500; background:rgba(15,23,42,.44); display:flex; align-items:center; justify-content:center; padding:18px; }
    .report-panel { width:min(520px, 100%); background:#fff; border:1px solid var(--line); border-radius:8px; box-shadow:0 24px 70px rgba(15,23,42,.24); padding:20px; position:relative; }
    .report-close { position:absolute; top:10px; right:10px; width:34px; height:34px; border:0; border-radius:6px; background:#f1f5f9; cursor:pointer; font-size:22px; line-height:1; }
    .report-panel h3 { margin:0 38px 8px 0; font-size:20px; }
    .report-panel p { margin:0 0 14px; color:var(--muted); line-height:1.45; }
    .report-form { display:grid; gap:10px; }
    .report-form label { display:grid; gap:5px; color:var(--ink); font-size:13px; font-weight:800; }
    .report-form textarea,.report-form input,.report-form select { width:100%; border:1px solid var(--line); border-radius:6px; padding:10px; font:inherit; }
    .report-form textarea { min-height:110px; resize:vertical; }
    .report-question-preview { border:1px solid var(--line); border-radius:6px; background:#f8fafc; padding:10px; color:#334155; font-size:13px; line-height:1.45; max-height:170px; overflow:auto; }
    .report-question-preview strong { display:block; color:var(--ink); margin-bottom:4px; }
    .report-question-preview ol { margin:6px 0 0 20px; padding:0; }
    .report-email-hint { margin:-4px 0 2px; color:var(--muted); font-size:12px; line-height:1.35; }
    .report-actions { display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; margin-top:4px; }
    .report-actions button { border:1px solid var(--line); background:#fff; border-radius:6px; padding:10px 14px; cursor:pointer; font-weight:800; }
    .report-actions .submit-report { background:var(--accent); border-color:var(--accent); color:#fff; }
    .report-status { min-height:20px; color:var(--muted); font-size:13px; }
    @media (max-width: 850px) {
      .topnav{padding:0 1rem}
      .nav-back{white-space:nowrap}
      .bank-head{padding:12px 10px 0}
      .bank-title{grid-template-columns:1fr}
      .head-stats{min-width:0}
      main { display:flex; flex-direction:column; padding:10px; }
      aside { order:2; position:relative; top:0; height:auto; }
      .tools{padding:10px;gap:7px}
      .stats{gap:6px}
      .qlist{display:flex;overflow-x:auto;gap:8px;padding:8px 10px;border-top:1px solid var(--line);scroll-snap-type:x proximity}
      .qrow{flex:0 0 78%;min-width:220px;max-width:250px;scroll-snap-align:start}
      .quiz { order:1; min-height:auto; padding:18px 14px; }
      .question { font-size:19px; }
      .brand-logo-img{width:190px;max-height:54px}
      .nav-right{gap:.55rem}
    }
    @media (max-width: 480px) {
      .topnav{padding:0 .75rem}
      .brand-logo-img{width:160px;max-height:46px}
      .nav-back{font-size:12px}
      .bank-head{padding:8px 8px 0}
      .bank-title{padding:14px}
      .eyebrow{font-size:10px;padding:5px 9px;margin-bottom:7px}
      h1{font-size:22px;letter-spacing:0}
      .sub{display:none}
      .head-stat{padding:8px 10px}
      .head-stat b{font-size:18px}
      .head-stats{grid-template-columns:repeat(2,minmax(0,1fr))}
      main{padding:8px}
      aside,section.quiz{border-radius:7px}
      .tools input,.tools select{padding:9px}
      .qrow{flex-basis:84%;min-width:210px}
      .question{font-size:18px;line-height:1.4}
      .option{font-size:15.5px;padding:12px 13px}
      .qimages{gap:10px}
      .nav button,.report-btn{flex:1 1 130px}
    }

<div class="report-modal" id="report-modal" hidden>

    <p id="report-summary">Tell us what needs correction.</p>
    <div id="report-question-preview" class="report-question-preview"></div>
    <form id="report-form" class="report-form" action="https://formspree.io/f/mpqgannw" method="POST">

      <label>Issue type
        <select name="issue_type" required>
          <option value="">Choose one</option><option value="Wrong answer">Wrong answer</option><option value="Wrong image">Wrong image</option><option value="Missing image">Missing image</option><option value="Wrong subject tag">Wrong subject tag</option><option value="Question or options need correction">Question or options need correction</option>
        </select>
      </label>
      <label>What should be corrected?
        <textarea name="details" required placeholder="Write the correction or describe the issue"></textarea>
      </label>
      <p id="report-email-rule" class="report-email-hint">Email is required so we can follow up.</p>
      <label>Email
        <input name="email" type="email" required autocomplete="email" placeholder="name@example.com" aria-describedby="report-email-rule">
      </label>
      <div class="report-actions"><button type="button" id="report-cancel">Cancel</button><button class="submit-report" type="submit">Send report</button></div>
    </form>
    <div id="report-status" class="report-status" aria-live="polite"></div>
  </div>
</div>

<script>
const DATA = JSON.parse(document.getElementById('question-data').textContent);
const REPORT_EXAM = 'NEET-PG Medicine PYT Bank';
const REPORT_ENDPOINT = 'https://formspree.io/f/mpqgannw';
const STORAGE_KEY = 'studydoc_medicine_pyt_attempts_v2';
let current = 0;
let subtopic = 'all';
let imageOnly = false;
const SUBTOPIC_ORDER = ["Cardiology", "Neurology", "Pulmonology", "Nephrology", "Endocrinology", "Rheumatology", "Infectious Diseases", "Gastroenterology/Hepatology", "Hematology/Oncology", "Critical Care", "Emergency Medicine"];
const $ = s => document.querySelector(s);
const attempts = new Map(Object.entries(JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}')));
function saveAttempts() { localStorage.setItem(STORAGE_KEY, JSON.stringify(Object.fromEntries(attempts))); }
function updateResetAllButton() {
  const resetAll = $('#reset-all');
  if (!resetAll) return;
  resetAll.disabled = attempts.size === 0;
  resetAll.textContent = attempts.size ? `Reset all progress (${attempts.size})` : 'Reset all progress';
}
function resetAllProgress() {
  if (!attempts.size) return;
  const count = attempts.size;
  const suffix = count === 1 ? '' : 's';
  if (!window.confirm(`Reset all saved progress for this question bank? This will clear ${count} attempted answer${suffix}.`)) return;
  attempts.clear();
  localStorage.removeItem(STORAGE_KEY);
  current = 0;
  renderList();
  renderQuiz();
}
function itemKey(item) { return String(item.number); }
function imageList(item) { return item.images || []; }
function isImageBased(item) { return imageList(item).length > 0; }
function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
function answerText(item) { return `${String.fromCharCode(65 + item.answerIndex)}. ${item.options[item.answerIndex] || ''}`; }
function optionLines(item) { return (item.options || []).map((opt, idx) => `${String.fromCharCode(65 + idx)}. ${opt}`); }
function questionWithOptions(item, practiceNumber, practiceTotal) {
  const lines = optionLines(item);
  const context = `Question shown on site: Q${practiceNumber}\nOriginal question ID: Q${item.number}`;
  return `${context}\n\nQuestion:\n${item.question || ''}${lines.length ? `\n\nOptions:\n${lines.join('\n')}` : ''}`;
}
function reportPreviewHtml(item, practiceNumber, practiceTotal) { return `<strong>Question being reported</strong><div><span class="qrow-id">Q${practiceNumber}</span></div><div>${escapeHtml(item.question)}</div><ol type="A">${(item.options || []).map(opt => `<li>${escapeHtml(opt)}</li>`).join('')}</ol>`; }
function populateSubtopics() {
  const subtopics = [...new Set(DATA.map(item => item.subtopic || 'Medicine').filter(Boolean))]
    .sort((a, b) => {
      const ai = SUBTOPIC_ORDER.indexOf(a);
      const bi = SUBTOPIC_ORDER.indexOf(b);
      return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi) || a.localeCompare(b);
    });
  $('#topic-filter').innerHTML = '<option value="all">All Medicine subtopics</option>' + subtopics.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
}
function filtered() {
  const q = $('#search').value.trim().toLowerCase();
  const f = $('#filter').value;
  return DATA.filter(item => {
    const hay = [item.question, (item.options || []).join(' '), item.subtopic, item.topic, item.explanation].join(' ').toLowerCase();
    if (q && !hay.includes(q)) return false;
    if (subtopic !== 'all' && (item.subtopic || 'Medicine') !== subtopic) return false;
    if (imageOnly && !isImageBased(item)) return false;
    const key = itemKey(item);
    if (f === 'unanswered') return !attempts.has(key);
    if (f === 'wrong') { const a = attempts.get(key); return a && !a.correct; }
    return true;
  });
}
function renderList() {
  const items = filtered();
  if (!items[current]) current = 0;
  $('#count').textContent = items.length;
  const visible = new Set(items.map(itemKey));
  let score = 0, answered = 0;
  for (const [key, val] of attempts) { if (visible.has(key)) { answered++; if (val.correct) score++; } }
  $('#answered').textContent = answered;
  $('#score').textContent = score;
  updateResetAllButton();
  $('#qlist').innerHTML = items.map((item, idx) => {
    const imgBadge = isImageBased(item) ? '<span class="qrow-img">Image/data</span>' : '';
    const done = attempts.has(itemKey(item)) ? ' done' : '';
    return `<button class="qrow${idx === current ? ' active' : ''}${done}" data-idx="${idx}"><b>Q${idx + 1}.</b> ${escapeHtml(item.question).slice(0,118)}<div class="qrow-meta"><span class="qrow-topic">${escapeHtml(item.subtopic || 'Medicine')}</span>${imgBadge}</div></button>`;
  }).join('');
  [...document.querySelectorAll('.qrow')].forEach(btn => btn.onclick = () => { current = Number(btn.dataset.idx); renderQuiz(); renderList(); });
}
function renderQuiz() {
  const items = filtered();
  const item = items[current];
  if (!item) { $('#quiz').innerHTML = '<p class="empty-state">No questions match this filter.</p>'; return; }
  const key = itemKey(item);
  const att = attempts.get(key);
  const imageNote = '';
  const images = imageList(item).length ? `<div class="qimages">${imageList(item).map((src, i) => `<figure><img src="${escapeHtml(src)}" alt="Medicine PYT image ${i + 1} for question ${current + 1}"></figure>`).join('')}</div>` : '';
  const opts = item.options.map((opt, idx) => {
    let cls = '';
    if (att) cls = idx === item.answerIndex ? ' correct' : (idx === att.choice ? ' wrong' : '');
    return `<button class="option${cls}" data-choice="${idx}"><b>${String.fromCharCode(65 + idx)}.</b> ${escapeHtml(opt)}</button>`;
  }).join('');
  let feedback = '';
  let explanation = '';
  if (att) {
    feedback = `<div class="feedback ${att.correct ? 'ok' : 'bad'}">${att.correct ? 'Correct.' : 'Wrong.'} Correct answer: ${escapeHtml(answerText(item))}</div>`;
    const optionNoteItems = (item.optionExplanations || []).map((note, idx) => ({ note: String(note || '').trim(), idx })).filter(entry => entry.note);
    const optionNotes = optionNoteItems.length ? `<div class="option-notes">${optionNoteItems.map(({note, idx}) => `<div class="option-note"><b>${String.fromCharCode(65 + idx)}.</b> ${escapeHtml(note)}</div>`).join('')}</div>` : '';
    explanation = `<div class="explanation"><h3>Why this is the answer</h3><p>${escapeHtml(item.explanation)}</p>${optionNotes}</div>`;
  }
  const remaining = Math.max(items.length - current - 1, 0);
  const progress = items.length ? Math.round(((current + 1) / items.length) * 100) : 0;
  const progressMeter = `<span class="remaining-meter" role="meter" aria-label="${remaining} questions remaining" aria-valuemin="0" aria-valuemax="${items.length}" aria-valuenow="${current + 1}"><span class="remaining-track"><span class="remaining-fill" style="width:${progress}%"></span></span><span class="remaining-count">${remaining} left</span></span>`;
  $('#quiz').innerHTML = `<div class="qtop"><span class="pill topic">${escapeHtml(item.subtopic || 'Medicine')}</span>${progressMeter}</div><h2 class="question">Q${current + 1}. ${escapeHtml(item.question)}</h2>${imageNote}${images}<div class="options">${opts}</div>${feedback}${explanation}<div class="nav"><button id="prev">Previous</button><button id="next">Next</button><button id="reset">Reset this answer</button><button id="report-question" class="report-btn" type="button">Report this question</button></div>`;
  [...document.querySelectorAll('.option')].forEach(btn => btn.onclick = () => {
    const choice = Number(btn.dataset.choice);
    attempts.set(key, {choice, correct: choice === item.answerIndex});
    saveAttempts();
    renderQuiz(); renderList();
  });
  $('#prev').onclick = () => { current = Math.max(0, current - 1); renderQuiz(); renderList(); };
  $('#next').onclick = () => { current = Math.min(items.length - 1, current + 1); renderQuiz(); renderList(); };
  $('#reset').onclick = () => { attempts.delete(key); saveAttempts(); renderQuiz(); renderList(); };
  $('#report-question').onclick = () => openReport(item, current + 1, items.length);
}
function openReport(item, practiceNumber, practiceTotal) {
  const form = $('#report-form');
  const summary = `${REPORT_EXAM} Q${practiceNumber}`;
  form.reset();
  form.elements.exam.value = REPORT_EXAM;
  form.elements.year.value = item.year || '2026';
  form.elements.question_number.value = item.number || '';
  form.elements.practice_number.value = practiceNumber || '';
  form.elements.practice_total.value = practiceTotal || '';
  form.elements.subject.value = 'Medicine';
  form.elements.page_url.value = window.location.href;
  form.elements.answer.value = answerText(item);
  form.elements.question.value = item.question || '';
  form.elements.options.value = optionLines(item).join('\n');
  form.elements.question_with_options.value = questionWithOptions(item, practiceNumber, practiceTotal);
  $('#report-summary').textContent = `${summary}. Tell us what needs correction.`;
  $('#report-question-preview').innerHTML = reportPreviewHtml(item, practiceNumber, practiceTotal);
  $('#report-status').textContent = '';
  $('#report-modal').hidden = false;
  setTimeout(() => form.elements.issue_type.focus(), 0);
}
function closeReport() { $('#report-modal').hidden = true; }
function submitReport(event) {
  event.preventDefault();
  const form = event.currentTarget;
  const status = $('#report-status');
  const emailField = form.elements.email;
  const email = emailField.value.trim();
  emailField.value = email;
  if (!email) { status.textContent = 'Enter your email before sending.'; emailField.focus(); return; }
  if (!emailField.checkValidity()) { status.textContent = 'Enter a valid email address before sending.'; emailField.reportValidity(); emailField.focus(); return; }
  const submit = form.querySelector('.submit-report');
  status.textContent = 'Sending report...';
  submit.disabled = true;
  const data = Object.fromEntries(new FormData(form).entries());
  form.elements['_subject'].value = `[StudyDoc report] ${data.exam || REPORT_EXAM} Practice ${data.practice_number || ''} / Original Q${data.question_number || ''}`.trim();
  const body = new FormData(form);
  fetch(REPORT_ENDPOINT, { method: 'POST', headers: { 'Accept': 'application/json' }, body })
    .then(res => { if (!res.ok) throw new Error('Report submission failed'); status.textContent = 'Thanks, report sent.'; form.reset(); setTimeout(closeReport, 900); })
    .catch(() => { status.textContent = 'Could not send in-page. Opening secure Formspree submit page...'; setTimeout(() => form.submit(), 250); })
    .finally(() => { submit.disabled = false; });
}
$('#search').oninput = () => { current = 0; renderList(); renderQuiz(); };
$('#filter').onchange = () => { current = 0; renderList(); renderQuiz(); };
$('#topic-filter').onchange = e => { subtopic = e.target.value; current = 0; renderList(); renderQuiz(); };
$('#img-toggle').onclick = () => { imageOnly = !imageOnly; $('#img-toggle').classList.toggle('active', imageOnly); $('#img-state').textContent = imageOnly ? 'On' : 'Off'; current = 0; renderList(); renderQuiz(); };
$('#reset-all').onclick = resetAllProgress;
$('#report-form').addEventListener('submit', submitReport);
$('#report-close').onclick = closeReport;
$('#report-cancel').onclick = closeReport;
$('#report-modal').addEventListener('click', e => { if (e.target.id === 'report-modal') closeReport(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && !$('#report-modal').hidden) closeReport(); });
populateSubtopics();
renderList();
renderQuiz();
</script>
