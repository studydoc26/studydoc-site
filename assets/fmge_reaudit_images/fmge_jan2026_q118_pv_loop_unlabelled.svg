<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Unlabelled left ventricular pressure-volume loop</title>
  <desc id="desc">A standard counterclockwise pressure-volume loop with points A, B, C, and D at the four valve-event corners.</desc>
  <rect width="760" height="520" fill="#ffffff"/>
  <g stroke="#111827" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M110 430V70"/>
    <path d="M110 430H690"/>
    <path d="M110 70l-10 22h20z" fill="#111827" stroke="none"/>
    <path d="M690 430l-22-10v20z" fill="#111827" stroke="none"/>
  </g>
  <g fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="26">
    <text x="25" y="60">Pressure</text>
    <text x="290" y="492">Left ventricular volume</text>
  </g>
  <path d="M250 360 C300 405 430 405 520 360 L520 175 C450 145 365 128 280 165 L250 210 Z"
        fill="#dbeafe" stroke="#1d4ed8" stroke-width="8" stroke-linejoin="round"/>
  <g fill="#dc2626" stroke="#ffffff" stroke-width="4">
    <circle cx="250" cy="360" r="13"/>
    <circle cx="520" cy="360" r="13"/>
    <circle cx="520" cy="175" r="13"/>
    <circle cx="280" cy="165" r="13"/>
  </g>
  <g fill="#991b1b" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    <text x="210" y="405">A</text>
    <text x="535" y="405">B</text>
    <text x="540" y="180">C</text>
    <text x="235" y="145">D</text>
  </g>
</svg>
